<style>
        body { font-family: 'Nunito Sans', sans-serif; }
        .input-heavy {
            border: 2px solid #E5E5E5;
            background-color: #f5f3f2;
            transition: all 0.2s ease-in-out;
        }
        .input-heavy:focus {
            outline: none;
            border-color: #006590;
            box-shadow: 0 0 0 2px rgba(0, 101, 144, 0.2);
            background-color: #ffffff;
        }
        .btn-heavy {
            box-shadow: 0 4px 0 0 #58A700;
            transition: all 0.1s ease-in-out;
        }
        .btn-heavy:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 0 #58A700;
        }
        .btn-heavy-outline {
            border: 2px solid #E5E5E5;
            box-shadow: 0 2px 0 0 #E5E5E5;
            transition: all 0.1s ease-in-out;
        }
        .btn-heavy-outline:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 0 #E5E5E5;
        }
        
        .tab-btn {
            position: relative;
            z-index: 1;
        }
        .tab-indicator {
            position: absolute;
            bottom: -2px;
            left: 0;
            height: 4px;
            background-color: #2b6c00;
            border-radius: 4px 4px 0 0;
            transition: all 0.3s ease;
            z-index: 2;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<!-- Main Container -->
<main class="w-full max-w-container-max mx-auto">
<!-- Header / Logo Area -->
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-xl shadow-[0_4px_0_0_#58A700] mb-md">
<span class="material-symbols-outlined text-[32px] text-on-primary" data-icon="monitor_heart">monitor_heart</span>
</div>
<h1 class="font-headline font-extrabold text-[32px] leading-[38px] text-on-surface">VitalPath</h1>
<p class="font-body font-bold text-[18px] text-on-surface-variant mt-xs">Sign in to continue your journey.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg border-2 border-border-gray shadow-[0_4px_0_0_#E5E5E5] p-lg w-full relative overflow-hidden">
<!-- Tabs -->
<div class="flex relative border-b-2 border-border-gray mb-lg" id="tabContainer">
<button class="tab-btn flex-1 pb-sm font-label font-bold text-[16px] text-primary transition-colors focus:outline-none" id="tabEmail" onclick="switchTab('email')">
                    Email
                </button>
<button class="tab-btn flex-1 pb-sm font-label font-bold text-[16px] text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" id="tabPhone" onclick="switchTab('phone')">
                    Phone OTP
                </button>
<!-- Indicator -->
<div class="tab-indicator w-1/2" id="tabIndicator"></div>
</div>
<!-- Forms Container -->
<div class="relative w-full h-[280px]">
<!-- Email Form -->
<form class="absolute inset-0 w-full transition-opacity duration-300 opacity-100 pointer-events-auto flex flex-col gap-md" id="formEmail">
<div class="flex flex-col gap-xs">
<label class="font-label font-bold text-[13px] text-on-surface uppercase tracking-wider" for="emailInput">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="mail">mail</span>
<input class="input-heavy w-full h-14 rounded pl-[44px] pr-sm font-body font-bold text-[15px] text-on-surface placeholder:text-on-surface-variant/50" id="emailInput" placeholder="hello@vitalpath.com" type="email">
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label font-bold text-[13px] text-on-surface uppercase tracking-wider" for="passwordInput">Password</label>
<a class="font-body font-bold text-[13px] text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="lock">lock</span>
<input class="input-heavy w-full h-14 rounded pl-[44px] pr-[44px] font-body font-bold text-[15px] text-on-surface placeholder:text-on-surface-variant/50" id="passwordInput" placeholder="••••••••" type="password">
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary focus:outline-none h-8 w-8 flex items-center justify-center rounded-full transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="visibilityIcon">visibility</span>
</button>
</div>
</div>
<button class="btn-heavy w-full h-14 bg-primary text-on-primary rounded font-label font-extrabold text-[16px] uppercase tracking-wider mt-sm flex items-center justify-center gap-xs" type="button">
                        Sign In
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Phone OTP Form -->
<form class="absolute inset-0 w-full transition-opacity duration-300 opacity-0 pointer-events-none flex flex-col gap-md" id="formPhone">
<div class="flex flex-col gap-xs">
<label class="font-label font-bold text-[13px] text-on-surface uppercase tracking-wider" for="phoneInput">Phone Number</label>
<div class="flex gap-sm">
<div class="relative w-24 shrink-0">
<select class="input-heavy w-full h-14 rounded pl-sm pr-lg font-body font-bold text-[15px] text-on-surface appearance-none cursor-pointer">
<option value="+1">+1</option>
<option value="+44">+44</option>
<option value="+91">+91</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
<div class="relative flex-grow">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="smartphone">smartphone</span>
<input class="input-heavy w-full h-14 rounded pl-[44px] pr-sm font-body font-bold text-[15px] text-on-surface placeholder:text-on-surface-variant/50" id="phoneInput" placeholder="(555) 123-4567" type="tel">
</div>
</div>
</div>
<p class="font-body font-bold text-[13px] text-on-surface-variant text-center my-xs">
                        We'll text you a secure code to confirm it's you.
                    </p>
<button class="btn-heavy w-full h-14 bg-primary text-on-primary rounded font-label font-extrabold text-[16px] uppercase tracking-wider mt-auto flex items-center justify-center gap-xs" type="button">
                        Send Code
                        <span class="material-symbols-outlined" data-icon="sms">sms</span>
</button>
</form>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-lg flex flex-col items-center gap-md">
<p class="font-body font-bold text-[15px] text-on-surface-variant">
                New to VitalPath? 
                <a class="text-primary hover:underline" href="#">Create an account</a>
</p>
<button class="btn-heavy-outline w-full h-14 bg-surface-container-lowest text-on-surface rounded font-label font-extrabold text-[16px] uppercase tracking-wider flex items-center justify-center gap-sm" type="button">
<img class="w-5 h-5 rounded-full object-cover" data-alt="A small, stylized digital icon representing a generic user profile or single sign-on provider. The icon should be minimalist, modern, and fit within a high-contrast, light-mode UI design, utilizing primary green or subtle gray tones. The mood is functional and clean." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJm8wGrNzblHle2Axne0N7JioF4L_qk-s_f1aeVdNrM2QrNrPh0H6Pf807owGML0rOvhlmLiYvM0MrA0S1VwlA7MGgdpuOFIa3N2o8J_1Gd-zldWkI4FCjwAcPdXdE6eygIkVbrnanPZqI140vWZbww1QdBl_trRLSjvO36FYRQe_J-1ZcYrpCx8AWCuqLkgc3zFj6fdBG0zbNptDRW-E1qiGApIrdW0sJwjVO6JvD7ytItA29JVmk14i3slRzB1_n20JZ6OjuHKGG">
                Continue with SSO
            </button>
</div>
</main>
<script>
        function switchTab(tabName) {
            const tabEmail = document.getElementById('tabEmail');
            const tabPhone = document.getElementById('tabPhone');
            const formEmail = document.getElementById('formEmail');
            const formPhone = document.getElementById('formPhone');
            const indicator = document.getElementById('tabIndicator');

            if (tabName === 'email') {
                // Update tabs
                tabEmail.classList.add('text-primary');
                tabEmail.classList.remove('text-on-surface-variant', 'hover:text-on-surface');
                tabPhone.classList.remove('text-primary');
                tabPhone.classList.add('text-on-surface-variant', 'hover:text-on-surface');
                
                // Move indicator
                indicator.style.transform = 'translateX(0%)';
                
                // Update forms
                formEmail.classList.remove('opacity-0', 'pointer-events-none');
                formEmail.classList.add('opacity-100', 'pointer-events-auto');
                
                formPhone.classList.remove('opacity-100', 'pointer-events-auto');
                formPhone.classList.add('opacity-0', 'pointer-events-none');
            } else {
                // Update tabs
                tabPhone.classList.add('text-primary');
                tabPhone.classList.remove('text-on-surface-variant', 'hover:text-on-surface');
                tabEmail.classList.remove('text-primary');
                tabEmail.classList.add('text-on-surface-variant', 'hover:text-on-surface');
                
                // Move indicator
                indicator.style.transform = 'translateX(100%)';
                
                // Update forms
                formPhone.classList.remove('opacity-0', 'pointer-events-none');
                formPhone.classList.add('opacity-100', 'pointer-events-auto');
                
                formEmail.classList.remove('opacity-100', 'pointer-events-auto');
                formEmail.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('visibilityIcon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
                icon.setAttribute('data-icon', 'visibility_off');
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
                icon.setAttribute('data-icon', 'visibility');
            }
        }
    </script>
</body></html>
