              "borderRadius": {

<style>
        body {
            font-family: 'Nunito Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Tactical animations for OTP inputs */
        .otp-input:focus {
            outline: none;
            border-color: #2fb8ff; /* secondary-container */
            box-shadow: 0 0 0 2px rgba(47, 184, 255, 0.2);
            transform: translateY(-2px);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .otp-input {
            transition: all 0.2s ease-out;
        }
        
        /* Shaking animation for error state */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        
        .error-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            border-color: #ba1a1a !important; /* error */
            color: #ba1a1a !important;
        }
        
        /* Heavy button interaction */
        .btn-heavy {
            box-shadow: 0 4px 0 0 #58A700; /* primary-shadow */
            transition: all 0.1s ease-in-out;
        }
        
        .btn-heavy:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 #58A700;
        }
        
        .btn-heavy:disabled {
            background-color: #eae8e7; /* surface-container-high */
            color: #dcd9d9; /* surface-dim */
            box-shadow: 0 4px 0 0 #dcd9d9;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Hide number input spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation for Linear Flow (Suppressed full nav, showing only back action) -->
<header class="w-full top-0 sticky bg-surface z-50 flex items-center h-16 px-4 max-w-[640px] mx-auto border-b-2 border-border-gray shadow-[0_2px_0_0_#E5E5E5]">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 text-on-surface-variant flex items-center justify-center" onclick="history.back()">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex-1 text-center font-headline font-extrabold text-headline-md text-primary tracking-tight -ml-8">
            VitalPath
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center p-4 max-w-[640px] mx-auto w-full w-full max-w-md mx-auto px-6 py-12 flex-1 flex flex-col justify-center">
<!-- Illustration / Context Header -->
<div class="mb-8 flex flex-col items-center text-center">
<div class="w-24 h-24 bg-primary-container/20 rounded-full flex items-center justify-center mb-6 border-4 border-primary-container relative">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">mark_email_read</span>
<!-- Decorative dot -->
<div class="absolute -top-1 -right-1 w-6 h-6 bg-tertiary-fixed-dim rounded-full border-2 border-surface flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-on-tertiary-fixed" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<h1 class="font-display font-extrabold text-headline-lg text-on-surface mb-2 tracking-tight">Check your email</h1>
<p class="font-body font-bold text-body-md text-on-surface-variant max-w-[280px]">
                We sent a 4-digit code to<br>
<span class="text-primary">alex@vitalpath.com</span>
</p>
</div>
<!-- OTP Input Area -->
<div class="w-full mb-10">
<form class="flex flex-col items-center w-full" id="otp-form">
<div class="flex justify-center gap-3 sm:gap-4 mb-8 w-full" id="otp-container">
<input aria-label="Digit 1" class="otp-input w-14 h-16 sm:w-16 sm:h-20 text-center font-headline font-extrabold text-headline-lg bg-surface-container-lowest border-2 border-border-gray rounded-xl shadow-[0_2px_0_0_#E5E5E5] text-on-surface caret-primary focus:ring-0" maxlength="1" pattern="\d*" type="number">
<input aria-label="Digit 2" class="otp-input w-14 h-16 sm:w-16 sm:h-20 text-center font-headline font-extrabold text-headline-lg bg-surface-container-lowest border-2 border-border-gray rounded-xl shadow-[0_2px_0_0_#E5E5E5] text-on-surface caret-primary focus:ring-0" maxlength="1" pattern="\d*" type="number">
<input aria-label="Digit 3" class="otp-input w-14 h-16 sm:w-16 sm:h-20 text-center font-headline font-extrabold text-headline-lg bg-surface-container-lowest border-2 border-border-gray rounded-xl shadow-[0_2px_0_0_#E5E5E5] text-on-surface caret-primary focus:ring-0" maxlength="1" pattern="\d*" type="number">
<input aria-label="Digit 4" class="otp-input w-14 h-16 sm:w-16 sm:h-20 text-center font-headline font-extrabold text-headline-lg bg-surface-container-lowest border-2 border-border-gray rounded-xl shadow-[0_2px_0_0_#E5E5E5] text-on-surface caret-primary focus:ring-0" maxlength="1" pattern="\d*" type="number">
</div>
<!-- Error Message Container (Hidden by default) -->
<div class="hidden flex items-center gap-2 text-error font-body font-bold text-label-sm mb-6 bg-error-container/50 px-4 py-2 rounded-lg border-2 border-error-container" id="error-message">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">error</span>
<span>Incorrect code. Please try again.</span>
</div>
<!-- Submit Button -->
<button class="btn-heavy w-full h-14 bg-primary text-on-primary rounded-xl font-label font-extrabold text-label-lg tracking-wide uppercase flex items-center justify-center gap-2" disabled="" id="verify-btn" type="button">
                    Verify Code
                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</form>
</div>
<!-- Resend Action -->
<div class="text-center mt-auto pb-8">
<p class="font-body font-bold text-body-md text-on-surface-variant mb-2">Didn't receive the code?</p>
<!-- Active Timer State -->
<div class="flex items-center justify-center gap-2 text-outline font-label font-bold text-label-sm uppercase tracking-wider bg-surface-container-low px-4 py-2 rounded-full border-2 border-border-gray w-fit mx-auto" id="timer-state">
<span class="material-symbols-outlined text-[16px]">schedule</span>
                Resend in <span class="w-8 text-left font-extrabold text-on-surface-variant" id="countdown">0:30</span>
</div>
<!-- Actionable State (Hidden initially) -->
<button class="hidden text-primary font-label font-extrabold text-label-sm uppercase tracking-wider hover:text-primary-shadow active:scale-95 transition-all flex items-center justify-center gap-1 mx-auto bg-primary-container/10 px-4 py-2 rounded-full border-2 border-primary-container/30" id="resend-btn">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">refresh</span>
                Resend Code
            </button>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            const verifyBtn = document.getElementById('verify-btn');
            const container = document.getElementById('otp-container');
            const errorMsg = document.getElementById('error-message');
            
            // Timer elements
            const timerState = document.getElementById('timer-state');
            const resendBtn = document.getElementById('resend-btn');
            const countdownEl = document.getElementById('countdown');
            
            let timerInterval;
            
            // Initial focus
            if(inputs.length > 0) {
                setTimeout(() => inputs[0].focus(), 300);
            }

            // OTP Input Logic
            inputs.forEach((input, index) => {
                // Handle Input
                input.addEventListener('input', (e) => {
                    // Clear error state on input
                    clearError();
                    
                    // Ensure only 1 character
                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1);
                    }
                    
                    // Move to next if filled
                    if (e.target.value !== '') {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                    
                    checkCompletion();
                });

                // Handle Keydown (Backspace navigation)
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace') {
                        clearError();
                        if (e.target.value === '' && index > 0) {
                            inputs[index - 1].focus();
                        }
                    }
                    
                    // Allow pasting full code
                    if (e.key === 'v' && (e.ctrlKey || e.metaKey)) {
                        // Handled by paste event
                        return;
                    }
                });
                
                // Handle Paste
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    clearError();
                    const pastedData = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 4);
                    
                    if (pastedData) {
                        pastedData.split('').forEach((char, i) => {
                            if (i < inputs.length) {
                                inputs[i].value = char;
                            }
                        });
                        
                        // Focus next empty or last
                        const nextEmpty = Array.from(inputs).findIndex(inp => inp.value === '');
                        if (nextEmpty !== -1) {
                            inputs[nextEmpty].focus();
                        } else {
                            inputs[inputs.length - 1].focus();
                        }
                        
                        checkCompletion();
                    }
                });
            });

            function checkCompletion() {
                const isComplete = Array.from(inputs).every(input => input.value !== '');
                verifyBtn.disabled = !isComplete;
                if(isComplete) {
                    verifyBtn.classList.remove('opacity-50');
                } else {
                    verifyBtn.classList.add('opacity-50');
                }
            }
            
            function clearError() {
                errorMsg.classList.add('hidden');
                inputs.forEach(inp => inp.classList.remove('error-shake'));
            }
            
            function showError() {
                errorMsg.classList.remove('hidden');
                inputs.forEach(inp => {
                    inp.classList.remove('error-shake');
                    // Force reflow
                    void inp.offsetWidth;
                    inp.classList.add('error-shake');
                });
            }

            // Verify Button Simulation
            verifyBtn.addEventListener('click', () => {
                const code = Array.from(inputs).map(i => i.value).join('');
                
                // Simulate loading/processing
                const originalText = verifyBtn.innerHTML;
                verifyBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Verifying...';
                verifyBtn.disabled = true;
                
                setTimeout(() => {
                    // Simulate random success/failure for demonstration
                    if (code === '1234' || Math.random() > 0.5) {
                        // Success
                        verifyBtn.classList.remove('bg-primary', 'text-on-primary');
                        verifyBtn.classList.add('bg-primary-container', 'text-on-primary-container');
                        verifyBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: \'FILL\' 1;">celebration</span> Success!';
                        
                        // Proceed to next screen (simulated)
                        setTimeout(() => {
                            alert('Verification successful! Returning to flow.');
                        }, 800);
                        
                    } else {
                        // Failure
                        verifyBtn.innerHTML = originalText;
                        verifyBtn.disabled = false;
                        showError();
                        inputs.forEach(i => i.value = '');
                        inputs[0].focus();
                        checkCompletion();
                    }
                }, 1000);
            });

            // Timer Logic
            function startTimer(duration) {
                let timer = duration;
                
                timerState.classList.remove('hidden');
                resendBtn.classList.add('hidden');
                
                timerInterval = setInterval(() => {
                    let seconds = parseInt(timer % 60, 10);
                    seconds = seconds < 10 ? "0" + seconds : seconds;
                    
                    countdownEl.textContent = `0:${seconds}`;
                    
                    if (--timer < 0) {
                        clearInterval(timerInterval);
                        timerState.classList.add('hidden');
                        resendBtn.classList.remove('hidden');
                    }
                }, 1000);
            }

            // Start initial timer
            startTimer(30);

            // Resend action
            resendBtn.addEventListener('click', () => {
                // Simulate sending email
                const originalContent = resendBtn.innerHTML;
                resendBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">sync</span> Sending...';
                
                setTimeout(() => {
                    resendBtn.innerHTML = originalContent;
                    startTimer(30);
                    clearError();
                    inputs.forEach(i => i.value = '');
                    inputs[0].focus();
                    checkCompletion();
                    
                    // Tiny toast simulation
                    const toast = document.createElement('div');
                    toast.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-surface-container-highest text-on-surface px-4 py-2 rounded-full font-label font-bold text-label-sm shadow-[0_2px_0_0_#dcd9d9] z-50 flex items-center gap-2';
                    toast.innerHTML = '<span class="material-symbols-outlined text-primary text-[18px]" style="font-variation-settings: \'FILL\' 1;">check_circle</span> Code resent';
                    document.body.appendChild(toast);
                    
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        toast.style.transition = 'opacity 0.3s ease';
                        setTimeout(() => toast.remove(), 300);
                    }, 2000);
                    
                }, 800);
            });
        });
    </script>
</body></html>
